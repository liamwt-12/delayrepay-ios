workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: DelayRepay Codemagic
    environment:
      groups:
        - code-signing
      vars:
        XCODE_SCHEME: "DelayRepay"
        APP_STORE_APPLE_ID: "6759646628"
        BUNDLE_ID: "uk.delayrepay.app"
      xcode: "16.2"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set build number
        script: |
          cd App
          agvtool new-version -all 21
      - name: Copy app icon
        script: |
          cp App/App/Assets.xcassets/AppIcon.appiconset/AppIcon.png App/App/Assets.xcassets/AppIcon.appiconset/AppIcon.png || true
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certs to keychain
        script: |
          keychain add-certificates
      - name: Use profiles
        script: |
          xcode-project use-profiles --project App/App.xcodeproj
      - name: Build IPA
        script: |
          cd App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
