workflows:
  delayrepay-ios:
    name: DelayRepay iOS
    max_build_duration: 30
    instance_type: mac_mini_m1
    
    environment:
      xcode: 16.2
      groups:
        - code-signing
      vars:
        BUNDLE_ID: uk.delayrepay.app
        APP_STORE_ID: "6759646628"
        XCODE_SCHEME: App
        XCODE_PROJECT: App/App.xcodeproj
    
    integrations:
      app_store_connect: DelayRepay Codemagic
    
    scripts:
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --feature PUSH_NOTIFICATIONS \
            --feature APPLE_SIGN_IN \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Increment build number
        script: |
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_ID" || echo "0")
          NEW_BUILD=$((LATEST_BUILD + 1))
          echo "Building version: $NEW_BUILD"
          cd App/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW_BUILD" Info.plist
          echo "BUILD_NUMBER=$NEW_BUILD" >> $CM_ENV

      - name: Build
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --archive-flags="-destination 'generic/platform=iOS'"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - build/ios/xcarchive/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
        beta_groups:
          - Beta Testers
